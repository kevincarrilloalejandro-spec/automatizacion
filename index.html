<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte — WhatsApp en Vivo</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --whatsapp-green: #25D366;
            --whatsapp-dark: #128C7E;
            --bg-page: #0d0d0d;
            --bg-chat: #1a1a1a;
            --bg-header: #111111;
            --bg-bubble-bot: #2a2a2a;
            --bg-bubble-user: #25D366;
            --text-white: #ffffff;
            --text-gray: #b9b9b9;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Particles Background */
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-page);
            font-family: 'Inter', sans-serif;
            color: var(--text-white);
            overflow: hidden; /* Header and chat scroll instead */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bubble-particle {
            position: absolute;
            background: var(--whatsapp-green);
            border-radius: 50%;
            opacity: 0.04;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-100px) translateX(20px); }
        }

        /* Navbar */
        nav {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .dot-green {
            width: 8px;
            height: 8px;
            background: var(--whatsapp-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--whatsapp-green);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .btn-direct {
            background: var(--whatsapp-green);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .btn-direct:hover {
            transform: scale(1.05);
            background: var(--whatsapp-dark);
        }

        /* Chat Container */
        .chat-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Mobile bottom feeling */
            padding-bottom: 20px;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 580px;
            height: 90vh; /* Relative to body flex */
            max-height: 800px;
            background: var(--bg-chat);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(37, 211, 102, 0.05);
            display: flex;
            flex-direction: column;
            margin: 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .chat-header {
            background: var(--bg-header);
            padding: 18px 25px;
            border-radius: 24px 24px 0 0;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: var(--whatsapp-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--whatsapp-green);
            border: 2px solid var(--bg-header);
            border-radius: 50%;
        }

        .header-info h3 {
            margin: 0;
            font-size: 1.05rem;
            font-family: 'Outfit', sans-serif;
        }

        .header-info p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--whatsapp-green);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Messages Area */
        #chatMessages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        #chatMessages::-webkit-scrollbar { width: 5px; }
        #chatMessages::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: slide-in 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble.bot {
            align-self: flex-start;
            background: var(--bg-bubble-bot);
            border-radius: 0 18px 18px 18px;
            color: white;
            border-left: 3px solid var(--whatsapp-green);
        }

        .bubble.user {
            align-self: flex-end;
            background: var(--bg-bubble-user);
            border-radius: 18px 0 18px 18px;
            color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }

        /* Typing Indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: var(--bg-bubble-bot);
            border-radius: 0 18px 18px 18px;
            width: fit-content;
            margin-bottom: 5px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: var(--whatsapp-green);
            border-radius: 50%;
            animation: typing-dots 1s infinite alternate;
        }

        .typing span:nth-child(2) { animation-delay: 0.3s; }
        .typing span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes typing-dots {
            from { opacity: 0.3; transform: scale(1); }
            to { opacity: 1; transform: scale(1.2); }
        }

        /* Input Area */
        .chat-input-area {
            background: var(--bg-header);
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 0 0 24px 24px;
        }

        .input-group {
            flex: 1;
            background: #2a2a2a;
            border-radius: 30px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group i { color: #666; font-size: 1.1rem; }

        input, textarea {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-family: inherit;
            font-size: 0.95rem;
        }

        textarea {
            resize: none;
            height: 24px;
            padding-top: 2px;
        }

        .btn-send {
            width: 45px;
            height: 45px;
            background: var(--whatsapp-green);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-send:hover { background: var(--whatsapp-dark); transform: scale(1.1); }
        .btn-send:disabled { background: #333; cursor: not-allowed; }

        /* Chips */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }

        .chip {
            background: #333;
            color: var(--whatsapp-green);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid var(--whatsapp-green);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .chip:hover {
            background: var(--whatsapp-green);
            color: white;
        }

        /* Success/Confetti Area */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Float Button */
        .float-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--whatsapp-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            animation: pulse-ring 2s infinite;
            text-decoration: none;
            z-index: 500;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Utilities */
        .hidden { display: none !important; }
        
        @media (max-width: 600px) {
            .chat-container {
                height: 85vh;
                margin: 0;
                border-radius: 0;
                border: none;
            }
            .chat-header { border-radius: 0; }
            .chat-input-area { border-radius: 0; }
            body { height: 100dvh; }
        }
    </style>
</head>
<body>

    <div class="bg-bubbles" id="bubbleBg"></div>

    <nav>
        <div class="nav-status">
            <div class="dot-green"></div>
            <span>En línea ahora</span>
        </div>
        <a href="https://wa.me/573138632478" target="_blank" class="btn-direct">
            <i class="fab fa-whatsapp"></i> WhatsApp directo
        </a>
    </nav>

    <div class="chat-wrapper">
        <div class="chat-container">
            <div class="chat-header">
                <div class="avatar">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="header-info">
                    <h3>Soporte en línea</h3>
                    <p><i class="fas fa-circle" style="font-size: 0.5rem;"></i> En línea</p>
                </div>
            </div>

            <div id="chatMessages">
                <!-- Messages will be injected here -->
            </div>

            <div class="chat-input-area" id="inputContainer">
                <div class="input-group">
                    <i class="fas fa-smile"></i>
                    <input type="text" id="chatInput" placeholder="Escribe tu nombre..." autocomplete="off">
                    <i class="fas fa-microphone"></i>
                </div>
                <button id="sendButton" class="btn-send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <!-- Waiting Indicator -->
            <div id="waitingIndicator" class="hidden" style="padding: 10px 20px; background: rgba(37, 211, 102, 0.05); border-top: 1px solid rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.8rem; color: var(--whatsapp-green);">
                <div class="dot-green" style="width: 6px; height: 6px;"></div>
                <span id="waitingText">Esperando respuesta... El equipo está revisando tu mensaje</span>
            </div>
        </div>
    </div>

    <!-- Final Link (hidden initially) -->
    <a href="https://wa.me/573138632478" target="_blank" class="float-btn">
        <i class="fab fa-whatsapp"></i>
    </a>

    <canvas id="confetti-canvas"></canvas>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            phone: '573138632478',
            apiKey: '3905984',
            baseUrl: 'https://api.callmebot.com/whatsapp.php'
        };

        let userName = '';
        let conversationId = '';
        let currentState = 'GREETING'; 

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const inputContainer = document.getElementById('inputContainer');
        const waitingIndicator = document.getElementById('waitingIndicator');
        const waitingText = document.getElementById('waitingText');

        // --- UTILS ---
        function generarId() {
            return 'conv_' + Math.random().toString(36).substr(2, 9);
        }

        // Shortcut to admin: Shift + Alt + R
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.altKey && e.code === 'KeyR') {
                window.location.href = 'admin-chat.html';
            }
        });

        // --- BACKGROUND BUBBLES ---
        function createBgBubbles() {
            const container = document.getElementById('bubbleBg');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble-particle';
                const size = Math.random() * 60 + 20;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}%`;
                bubble.style.top = `${Math.random() * 100}%`;
                bubble.style.animationDelay = `${Math.random() * 10}s`;
                bubble.style.animationDuration = `${Math.random() * 10 + 10}s`;
                container.appendChild(bubble);
            }
        }

        // --- CONVERSATION LOGIC ---

        function appendMessage(text, type, options = {}) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${type}`;
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            chatMessages.appendChild(bubble);
            
            if (options.chips) {
                const chipsDiv = document.createElement('div');
                chipsDiv.className = 'chips-container';
                options.chips.forEach(chipText => {
                    const chip = document.createElement('div');
                    chip.className = 'chip';
                    chip.textContent = chipText;
                    chip.onclick = () => handleChipSelection(chipText);
                    chipsDiv.appendChild(chip);
                });
                chatMessages.appendChild(chipsDiv);
            }

            chatMessages.scrollTop = chatMessages.scrollHeight;
            return bubble;
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.id = 'typingIndicator';
            typing.className = 'typing reveal';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(typing);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function botReply(text, options = {}, delay = 800) {
            showTyping();
            await new Promise(r => setTimeout(r, delay));
            removeTyping();
            appendMessage(text, 'bot', options);
        }

        // --- FLOW HANDLERS ---

        async function initFlow() {
            createBgBubbles();
            await botReply('👋 ¡Hola! Bienvenido.');
            await botReply('¿Cuál es tu nombre?');
            currentState = 'NAME_INPUT';
        }

        async function handleUserInput() {
            const val = chatInput.value.trim();
            if (!val) return;

            if (currentState === 'NAME_INPUT') {
                userName = val;
                chatInput.value = '';
                appendMessage(userName, 'user');
                currentState = 'WAITING';
                
                await botReply(`¡Hola ${userName}! 😊`);
                await botReply(`¿En qué podemos ayudarte hoy?`, {
                    chips: ['📋 Necesito información']
                });
                chatInput.placeholder = 'Selecciona una una opción arriba...';
                chatInput.disabled = true;
                sendButton.disabled = true;

            } else if (currentState === 'MESSAGE_INPUT') {
                const msg = val;
                chatInput.value = '';
                appendMessage(msg, 'user');
                currentState = 'SENDING';
                
                chatInput.disabled = true;
                sendButton.disabled = true;

                await botReply('📨 Enviando tu mensaje directamente...');
                await enviarMensaje(userName, msg);
            }
        }

        async function handleChipSelection(text) {
            appendMessage(text, 'user');
            // Remove chips from UI
            document.querySelectorAll('.chip').forEach(c => c.remove());
            
            await botReply(`Perfecto ✅ Cuéntanos tu mensaje y te respondemos lo antes posible 👇`);
            
            // Transform input to textarea for message
            const parent = chatInput.parentElement;
            const textarea = document.createElement('textarea');
            textarea.id = 'chatInput';
            textarea.placeholder = 'Escribe tu mensaje aquí...';
            textarea.autocomplete = 'off';
            textarea.maxLength = 500;
            
            // Use character counter
            const counter = document.createElement('div');
            counter.className = 'char-counter';
            counter.style.fontSize = '0.7rem';
            counter.style.position = 'absolute';
            counter.style.bottom = '10px';
            counter.style.right = '80px';
            counter.style.color = '#666';
            counter.textContent = '0/500';
            
            chatInput.replaceWith(textarea);
            inputContainer.appendChild(counter);
            
            textarea.focus();
            textarea.addEventListener('input', () => {
                counter.textContent = `${textarea.value.length}/500`;
                sendButton.disabled = textarea.value.trim() === '';
            });

            currentState = 'MESSAGE_INPUT';
            
            // Re-bind enter key
            textarea.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleUserInput();
                }
            });
        }

        // --- API & POLLING ---

        async function enviarMensaje(nombre, mensaje) {
            conversationId = generarId();
            const timestamp = new Date().toISOString();

            // Notify Admin via CallMeBot
            const textoAdmin = `🔔 NUEVO MENSAJE EN EL CHAT
━━━━━━━━━━━━━━━━━━━━
👤 Nombre: ${nombre}
💬 Mensaje: ${mensaje}
⏰ Hora: ${new Date().toLocaleString('es-CO')}
━━━━━━━━━━━━━━━━━━━━
📲 Responde en: ${window.location.origin}/admin-chat.html`;

            const url = `${CONFIG.baseUrl}?phone=${CONFIG.phone}&text=${encodeURIComponent(textoAdmin)}&apikey=${CONFIG.apiKey}`;

            try {
                fetch(url, { method: 'GET', mode: 'no-cors' });

                // Save to localStorage
                localStorage.setItem(conversationId, JSON.stringify({
                    nombre,
                    mensajes: [{ sender: 'user', texto: mensaje, hora: timestamp }]
                }));

                const todas = JSON.parse(localStorage.getItem('todas_conversaciones') || '[]');
                todas.unshift({
                    id: conversationId,
                    nombre,
                    ultimoMensaje: mensaje,
                    hora: timestamp,
                    sinLeer: true
                });
                localStorage.setItem('todas_conversaciones', JSON.stringify(todas));

                await new Promise(r => setTimeout(r, 1500));
                
                await botReply(`⏳ Tu mensaje fue enviado ${nombre}. Estamos revisando tu consulta... Te responderemos aquí mismo en breve 👇`);
                
                // Show waiting indicator
                waitingIndicator.classList.remove('hidden');
                
                iniciarPolling(conversationId);

            } catch (error) {
                await botReply('❌ Error al conectar. Intenta de nuevo.');
                currentState = 'MESSAGE_INPUT';
                document.getElementById('chatInput').disabled = false;
                sendButton.disabled = false;
            }
        }

        function iniciarPolling(id) {
            const polling = setInterval(() => {
                const resKey = 'respuesta_' + id;
                const respuesta = JSON.parse(localStorage.getItem(resKey) || 'null');

                if (respuesta && !respuesta.leida) {
                    clearInterval(polling);
                    
                    // Mark as read
                    respuesta.leida = true;
                    localStorage.setItem(resKey, JSON.stringify(respuesta));

                    // Update waiting indicator
                    waitingText.textContent = '✅ ¡Tienes una respuesta!';
                    waitingIndicator.style.background = 'rgba(37, 211, 102, 0.2)';
                    
                    // Bot response animation
                    setTimeout(async () => {
                        await botReply(respuesta.texto, {}, 2000);
                        
                        // Notify user
                        document.title = '💬 Nueva respuesta!';
                        setTimeout(() => document.title = 'Chat · Soporte en Vivo', 4000);
                        
                        mostrarConfeti();
                        waitingIndicator.classList.add('hidden');
                    }, 500);
                }
            }, 3000);
        }

        // --- CONFETTI ---
        function mostrarConfeti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: -10, r: Math.random() * 6 + 2, d: Math.random() * 10,
                    color: i % 2 === 0 ? '#25D366' : '#128C7E', tilt: Math.random() * 10 - 10, speed: Math.random() * 3 + 2
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, i) => {
                    ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y); ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke(); p.y += p.speed; p.tilt += 0.1;
                    if (p.y > canvas.height) particles[i].y = -10;
                });
                requestAnimationFrame(draw);
            }
            draw();
            setTimeout(() => { canvas.style.opacity = '0'; }, 3000);
            setTimeout(() => { canvas.hidden = true; }, 5000);
        }

        // --- LISTENERS ---
        sendButton.addEventListener('click', handleUserInput);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUserInput();
        });

        window.onload = initFlow;

    </script>
</body>
</html>
